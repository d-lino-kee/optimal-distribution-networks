version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  go-api:
    build:
      context: .
      dockerfile: go-api/Dockerfile
    image: distribution-optimizer/go-api:latest
    depends_on: [kafka]
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      SOLVER_BINARY: "/usr/local/bin/solver"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_ENABLED: "true"
      ALLOWED_ORIGINS: "http://localhost:3000"

  scala-kafka:
    build:
      context: ./scala-kafka
      dockerfile: Dockerfile
    image: distribution-optimizer/scala-kafka:latest
    depends_on: [kafka]
    environment:
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_APP_ID: "demand-stream-app"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080"
    image: distribution-optimizer/frontend:latest
    ports:
      - "3000:80"
    depends_on: [go-api]
